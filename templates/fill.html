<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iDealz — Create Agreement</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #eef2f7; min-height: 100vh; padding: 30px 16px 70px; color: #1a1a2e; }
    .wrap { max-width: 640px; margin: 0 auto; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,80,160,0.13); }
    .header { background: linear-gradient(135deg, #ffffff 0%, #f0f6ff 60%, #e3eeff 100%); border-bottom: 3px solid #1565C0; padding: 22px 28px 18px; position: relative; overflow: hidden; }
    .header::after { content: ""; position: absolute; top: -40px; right: -40px; width: 200px; height: 200px; background: rgba(21,101,192,0.06); border-radius: 50%; }
    .header-logo { height: 55px; object-fit: contain; object-position: left; display: block; margin-bottom: 8px; position: relative; z-index: 1; background: transparent; }
    .header-title { color: #0d2244; font-size: 16px; font-weight: 600; position: relative; z-index: 1; }
    .header-sub { color: #5a7a96; font-size: 12px; margin-top: 3px; position: relative; z-index: 1; }
    .body { padding: 26px 28px; }
    .section-title { font-size: 10.5px; font-weight: 700; color: #1565C0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ""; display: block; width: 3px; height: 14px; background: #1565C0; border-radius: 2px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; color: #546e8a; font-weight: 600; margin-bottom: 4px; }
    .field input, .field select, .field textarea { width: 100%; padding: 10px 12px; font-size: 14px; border: 1.5px solid #dde6f0; border-radius: 10px; background: #f8fbff; color: #1a1a2e; font-family: inherit; transition: border-color 0.15s; }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #1565C0; background: #fff; box-shadow: 0 0 0 3px rgba(21,101,192,0.1); }
    .field input.err { border-color: #e53935; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .divider { border: none; border-top: 1px solid #eef2f7; margin: 16px 0; }
    .btn-primary { width: 100%; padding: 13px; font-size: 15px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; background: linear-gradient(135deg, #1565C0, #1976D2); color: #fff; font-family: inherit; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.92; }
    .link-box { display: none; margin-top: 20px; background: #f0f6ff; border: 1.5px solid #1565C0; border-radius: 12px; padding: 18px; }
    .link-box h3 { font-size: 13px; color: #0d2244; font-weight: 700; margin-bottom: 10px; }
    .link-url { background: #fff; border: 1px solid #dde6f5; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #1565C0; word-break: break-all; margin-bottom: 12px; font-family: monospace; }
    .btn-copy { width: 100%; padding: 11px; font-size: 14px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; background: #1565C0; color: #fff; font-family: inherit; margin-bottom: 8px; }
    .btn-copy:hover { background: #1976D2; }
    .btn-whatsapp { width: 100%; padding: 11px; font-size: 14px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; background: #25D366; color: #fff; font-family: inherit; }
    .btn-whatsapp:hover { background: #20b858; }
    .copy-msg { font-size: 12px; color: #2e7d32; text-align: center; margin-top: 6px; display: none; }
    .footer { background: #f7faff; border-top: 1px solid #e8eef7; padding: 12px 28px; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { height: 24px; object-fit: contain; opacity: 0.85; }
    .footer-text { font-size: 11px; color: #a0b4c8; }
    @media (max-width: 500px) { .row2 { grid-template-columns: 1fr; } .body { padding: 20px; } }
  </style>
</head>

<script>
  function validate() {
    let ok = true;
    ["name","email","idz-name"].forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) { el.classList.add("err"); ok=false; }
      else el.classList.remove("err");
    });
    return ok;
  }

  function generateLink() {
    if (!validate()) return;

    const data = {
      name:       document.getElementById("name").value.trim(),
      email:      document.getElementById("email").value.trim(),
      phone:      document.getElementById("phone").value.trim(),
      handle:     document.getElementById("handle").value.trim(),
      platform:   document.getElementById("platform").value,
      content:    document.getElementById("content").value,
      sd:         document.getElementById("start-date").value,
      ed:         document.getElementById("end-date").value,
      comp:       document.getElementById("compensation").value.trim(),
      tmodel:     document.getElementById("trade-model").value.trim(),
      trate:      document.getElementById("trade-rate").value.trim(),
      nmodel:     document.getElementById("new-model").value.trim(),
      idzname:    document.getElementById("idz-name").value.trim(),
      idzdesg:    document.getElementById("idz-desg").value.trim(),
    };

    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    const base = window.location.origin + window.location.pathname.replace("fill", "sign");
    const link = base + "?d=" + encoded;

    document.getElementById("link-url").textContent = link;
    document.getElementById("link-box").style.display = "block";
    document.getElementById("link-box").scrollIntoView({behavior:"smooth"});
  }

  function copyLink() {
    const link = document.getElementById("link-url").textContent;
    navigator.clipboard.writeText(link).then(() => {
      const msg = document.getElementById("copy-msg");
      msg.style.display = "block";
      setTimeout(() => msg.style.display = "none", 2500);
    });
  }

  function sendWhatsApp() {
    const link = document.getElementById("link-url").textContent;
    const name = document.getElementById("name").value.trim();
    const msg = "Hi " + name + ", please sign your iDealz collaboration agreement here: " + link;
    window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
  }



  // ── Content type smart picker ──
  const CONTENT_TYPES = [
    "Reels","Short video","Feed post","Stories",
    "YouTube video","YouTube Short","Live session",
    "TikTok video","Instagram post","Carousel post",
    "Unboxing video","Review video","Tutorial",
    "Product showcase","Brand mention","Story mentions",
    "Highlight","Blog post","Podcast mention"
  ];
  let selectedContent = [];

  function renderContentChips() {
    const chips = document.getElementById("content-chips");
    chips.innerHTML = selectedContent.map((p,i) =>
      `<span style="display:inline-flex;align-items:center;gap:4px;background:#2e7d32;color:#fff;
        font-size:12px;font-weight:600;padding:3px 10px 3px 10px;border-radius:20px;white-space:nowrap">
        ${p}
        <span onclick="removeContent(${i})" style="cursor:pointer;font-size:14px;line-height:1;margin-left:2px;opacity:0.8">&times;</span>
      </span>`
    ).join("");
    document.getElementById("content").value = selectedContent.join(" + ");
  }

  function removeContent(i) {
    selectedContent.splice(i, 1);
    renderContentChips();
    document.getElementById("content-input").focus();
  }

  function addContent(name) {
    name = name.trim();
    if (!name) return;
    if (!selectedContent.includes(name)) {
      selectedContent.push(name);
      renderContentChips();
    }
    document.getElementById("content-input").value = "";
    closeContentDropdown();
    document.getElementById("content-input").focus();
  }

  function showContentDropdown(query) {
    const dd = document.getElementById("content-dropdown");
    const matches = CONTENT_TYPES.filter(p =>
      p.toLowerCase().includes(query.toLowerCase()) && !selectedContent.includes(p)
    );
    if (!matches.length) { closeContentDropdown(); return; }
    dd.innerHTML = matches.map(p =>
      `<div onclick="addContent('${p}')"
        style="padding:10px 14px;font-size:13px;cursor:pointer;color:#1a1a2e;border-bottom:1px solid #f0f5fb"
        onmouseover="this.style.background='#f0f6ff'" onmouseout="this.style.background=''">${p}</div>`
    ).join("");
    const box = document.getElementById("content-tags");
    const rect = box.getBoundingClientRect();
    dd.style.width = rect.width + "px";
    dd.style.display = "block";
    box.style.borderColor = "#1565C0";
    box.style.boxShadow = "0 0 0 3px rgba(21,101,192,0.1)";
  }

  function closeContentDropdown() {
    document.getElementById("content-dropdown").style.display = "none";
    document.getElementById("content-tags").style.borderColor = "#dde6f0";
    document.getElementById("content-tags").style.boxShadow = "none";
  }

  document.getElementById("content-input").addEventListener("input", function() {
    const q = this.value.trim();
    if (q.length > 0) showContentDropdown(q);
    else closeContentDropdown();
  });

  document.getElementById("content-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault();
      const val = this.value.trim();
      if (val) addContent(val);
    }
    if (e.key === "Backspace" && !this.value && selectedContent.length) {
      selectedContent.pop();
      renderContentChips();
    }
  });

  document.addEventListener("click", function(e) {
    const tags = document.getElementById("content-tags");
    const dd = document.getElementById("content-dropdown");
    if (!tags || !dd) return;
    if (!tags.contains(e.target) && !dd.contains(e.target)) closeContentDropdown();
  });

  // ── Platform smart picker ──
  const PLATFORMS = [
    "Instagram","TikTok","YouTube","Facebook",
    "Snapchat","Twitter / X","LinkedIn","Pinterest",
    "Threads","WhatsApp","Telegram","Discord",
    "Twitch","Clubhouse","BeReal"
  ];
  let selectedPlatforms = [];

  function renderChips() {
    const chips = document.getElementById("platform-chips");
    chips.innerHTML = selectedPlatforms.map((p,i) =>
      `<span style="display:inline-flex;align-items:center;gap:4px;background:#1565C0;color:#fff;
        font-size:12px;font-weight:600;padding:3px 10px 3px 10px;border-radius:20px;white-space:nowrap">
        ${p}
        <span onclick="removePlatform(${i})" style="cursor:pointer;font-size:14px;line-height:1;margin-left:2px;opacity:0.8">&times;</span>
      </span>`
    ).join("");
    document.getElementById("platform").value = selectedPlatforms.join(" + ");
  }

  function removePlatform(i) {
    selectedPlatforms.splice(i, 1);
    renderChips();
    document.getElementById("platform-input").focus();
  }

  function addPlatform(name) {
    name = name.trim();
    if (!name) return;
    if (!selectedPlatforms.includes(name)) {
      selectedPlatforms.push(name);
      renderChips();
    }
    document.getElementById("platform-input").value = "";
    closeDropdown();
    document.getElementById("platform-input").focus();
  }

  function showDropdown(query) {
    const dd = document.getElementById("platform-dropdown");
    const matches = PLATFORMS.filter(p =>
      p.toLowerCase().includes(query.toLowerCase()) && !selectedPlatforms.includes(p)
    );
    if (!matches.length) { closeDropdown(); return; }
    dd.innerHTML = matches.map(p =>
      `<div onclick="addPlatform('${p}')"
        style="padding:10px 14px;font-size:13px;cursor:pointer;color:#1a1a2e;border-bottom:1px solid #f0f5fb"
        onmouseover="this.style.background='#f0f6ff'" onmouseout="this.style.background=''">${p}</div>`
    ).join("");
    const box = document.getElementById("platform-tags");
    const rect = box.getBoundingClientRect();
    dd.style.width = rect.width + "px";
    dd.style.display = "block";
    box.style.borderColor = "#1565C0";
    box.style.boxShadow = "0 0 0 3px rgba(21,101,192,0.1)";
  }

  function closeDropdown() {
    document.getElementById("platform-dropdown").style.display = "none";
    document.getElementById("platform-tags").style.borderColor = "#dde6f0";
    document.getElementById("platform-tags").style.boxShadow = "none";
  }

  document.getElementById("platform-input").addEventListener("input", function() {
    const q = this.value.trim();
    if (q.length > 0) showDropdown(q);
    else closeDropdown();
  });

  document.getElementById("platform-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault();
      const val = this.value.trim();
      if (val) addPlatform(val);
    }
    if (e.key === "Backspace" && !this.value && selectedPlatforms.length) {
      selectedPlatforms.pop();
      renderChips();
    }
  });

  document.addEventListener("click", function(e) {
    const tags = document.getElementById("platform-tags");
    const dd = document.getElementById("platform-dropdown");
    if (!tags.contains(e.target) && !dd.contains(e.target)) closeDropdown();
  });

  document.querySelectorAll(".field input:not(#platform-input)").forEach(el =>
    el.addEventListener("input", () => el.classList.remove("err"))
  );
</script>
</body>
</html>
